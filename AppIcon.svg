<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Emerald gradient background -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#14694F"/>
      <stop offset="50%" style="stop-color:#0F4F3E"/>
      <stop offset="100%" style="stop-color:#0A3A2E"/>
    </linearGradient>

    <!-- Gold gradient for waveform -->
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4B976"/>
      <stop offset="100%" style="stop-color:#C9A961"/>
    </linearGradient>

    <!-- Subtle glow -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="20" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" fill="url(#bgGradient)"/>

  <!-- Subtle circle accent -->
  <circle cx="300" cy="300" r="400" fill="#1A8B66" opacity="0.15"/>
  <circle cx="750" cy="750" r="300" fill="#C9A961" opacity="0.08"/>

  <!-- Waveform bars - centered, with musical wave pattern -->
  <g transform="translate(512, 512)" filter="url(#glow)">
    <!-- Center group of waveform bars -->
    <rect x="-240" y="-80" width="48" height="160" rx="24" fill="url(#goldGradient)"/>
    <rect x="-160" y="-140" width="48" height="280" rx="24" fill="url(#goldGradient)"/>
    <rect x="-80" y="-200" width="48" height="400" rx="24" fill="url(#goldGradient)"/>
    <rect x="0" y="-160" width="48" height="320" rx="24" fill="url(#goldGradient)"/>
    <rect x="80" y="-220" width="48" height="440" rx="24" fill="url(#goldGradient)"/>
    <rect x="160" y="-120" width="48" height="240" rx="24" fill="url(#goldGradient)"/>
    <rect x="240" y="-60" width="48" height="120" rx="24" fill="url(#goldGradient)"/>
  </g>
</svg>
